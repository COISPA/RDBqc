name: R-CMD-check

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - "RDBqc/**"
      - ".github/workflows/r.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "RDBqc/**"
      - ".github/workflows/r.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        r-version: [ "release", "devel" ]

    defaults:
      run:
        working-directory: RDBqc

    steps:
      - uses: actions/checkout@v4

      - name: Set up R ${{ matrix.r-version }}
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}

      - name: Install dependencies
        shell: Rscript {0}
        run: |
          install.packages(c("remotes", "rcmdcheck"), repos = "https://cloud.r-project.org")
          remotes::install_deps(dependencies = TRUE)

      - name: Check
        shell: Rscript {0}
        run: |
          rcmdcheck::rcmdcheck(args = c("--no-manual", "--as-cran"), error_on = "error")
